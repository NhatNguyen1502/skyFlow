akka {
  loglevel = "INFO"
  
  actor {
    provider = "local"
    
    # Default dispatcher
    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 2.0
        parallelism-max = 10
      }
      throughput = 5
    }
  }
  
  # Akka HTTP configuration
  http {
    server {
      server-header = akka-http/${akka.http.version}
      idle-timeout = 60s
      request-timeout = 20s
      bind-timeout = 1s
      
      # Logging
      preview.enable-http2 = on
    }
    
    client {
      connecting-timeout = 10s
      idle-timeout = 60s
    }
    
    host-connection-pool {
      max-connections = 4
      max-open-requests = 32
    }
  }
  
  # Akka Persistence configuration with PostgreSQL
  persistence {
    journal {
      plugin = "jdbc-journal"
      auto-start-journals = ["jdbc-journal"]
    }
    
    snapshot-store {
      plugin = "jdbc-snapshot-store"
      auto-start-snapshot-stores = ["jdbc-snapshot-store"]
    }
  }
  
  # Serialization setup for Akka Persistence
  actor {
    serializers {
      jackson-json = "akka.serialization.jackson.JacksonJsonSerializer"
    }
    
    serialization-bindings {
      "com.akka.learning.models.CborSerializable" = jackson-json
    }
  }
}

# PostgreSQL JDBC configuration
postgres-db {
  host = "localhost"
  port = 5432
  database = "akka_flight_ops"
  user = "postgres"
  password = "postgres"
}

jdbc-connection-settings {
  driver = "org.postgresql.Driver"
  
  # Connection pool settings with HikariCP
  url = "jdbc:postgresql://"${postgres-db.host}":"${postgres-db.port}"/"${postgres-db.database}
  user = ${postgres-db.user}
  password = ${postgres-db.password}
  
  # HikariCP settings
  connectionPool = "HikariCP"
  poolName = "akka-persistence-pool"
  numThreads = 5
  maxConnections = 10
  minConnections = 2
  maxLifetime = 600000 # 10 minutes
  idleTimeout = 300000 # 5 minutes
  connectionTimeout = 5000 # 5 seconds
  leakDetectionThreshold = 60000 # 1 minute
}

# JDBC Journal configuration
jdbc-journal {
  slick = ${jdbc-connection-settings}
  circuit-breaker {
    max-failures = 5
    call-timeout = 10s
    reset-timeout = 30s
  }
}

# JDBC Snapshot store configuration
jdbc-snapshot-store {
  slick = ${jdbc-connection-settings}
  circuit-breaker {
    max-failures = 5
    call-timeout = 10s
    reset-timeout = 30s
  }
}

# Read journal configuration
jdbc-read-journal {
  slick = ${jdbc-connection-settings}
  
  # Refresh interval for events
  refresh-interval = 1s
  
  # Maximum buffer size
  max-buffer-size = 500
}

# Application configuration
app {
  http {
    interface = "0.0.0.0"
    port = 8080
  }
  
  # Database configuration
  database {
    host = ${postgres-db.host}
    port = ${postgres-db.port}
    name = ${postgres-db.database}
    user = ${postgres-db.user}
    password = ${postgres-db.password}
  }
  
  # Flight operations configuration
  flight {
    max-capacity = 300
    default-allocation-timeout = 30s
  }
  
  # Stream configuration
  stream {
    parallelism = 4
    buffer-size = 100
  }
}
