akka {
  loglevel = "INFO"
  
  actor {
    provider = "local"
    
    # Serialization setup for Akka Persistence (Phase 5)
    serializers {
      jackson-json = "akka.serialization.jackson.JacksonJsonSerializer"
    }
    
    serialization-bindings {
      "com.skyflow.shared.infrastructure.serialization.CborSerializable" = jackson-json
    }
    
    # Default dispatcher
    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 2.0
        parallelism-max = 10
      }
      throughput = 5
    }
  }
  
  # Akka HTTP configuration
  http {
    server {
      server-header = akka-http/${akka.http.version}
      idle-timeout = 60s
      request-timeout = 20s
      bind-timeout = 1s
      
      # Logging
      preview.enable-http2 = on
    }
    
    client {
      connecting-timeout = 10s
      idle-timeout = 60s
    }
    
    host-connection-pool {
      max-connections = 4
      max-open-requests = 32
    }
  }
  
  # Akka Persistence configuration - using PostgreSQL
  persistence {
    journal {
      plugin = "jdbc-journal"
      auto-start-journals = ["jdbc-journal"]
    }
    
    snapshot-store {
      plugin = "jdbc-snapshot-store"
      auto-start-snapshot-stores = ["jdbc-snapshot-store"]
    }
  }
}

# PostgreSQL database configuration
postgres-db {
  host = "localhost"
  port = 5432
  database = "akka_flight_ops"
  user = "postgres"
  password = "postgres"
}

# JDBC connection settings for PostgreSQL
jdbc-connection-settings {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://"${postgres-db.host}":"${postgres-db.port}"/"${postgres-db.database}
    user = ${postgres-db.user}
    password = ${postgres-db.password}
    connectionPool = "HikariCP"
    poolName = "akka-persistence-pool"
    numThreads = 5
    maxConnections = 10
    minConnections = 2
    maxLifetime = 600000
    idleTimeout = 300000
    connectionTimeout = 5000
    leakDetectionThreshold = 60000
  }
}

# JDBC Journal configuration
# akka-persistence-jdbc 5.x uses 'event_journal' table by default (tables.event key)
jdbc-journal {
  slick = ${jdbc-connection-settings}

  circuit-breaker {
    max-failures = 10
    call-timeout = 20s
    reset-timeout = 30s
  }
}

# JDBC Snapshot store configuration
# akka-persistence-jdbc 5.x uses column 'snapshot_payload' (snapshotPayload key) by default
jdbc-snapshot-store {
  slick = ${jdbc-connection-settings}

  circuit-breaker {
    max-failures = 10
    call-timeout = 20s
    reset-timeout = 30s
  }
}

# JDBC Read Journal configuration — used by FlightRegistry on startup to recover all flights
jdbc-read-journal {
  slick = ${jdbc-connection-settings}
}

app {
  http {
    interface = "localhost"
    port = 8080
  }
  
  # Database configuration
  database {
    host = ${postgres-db.host}
    port = ${postgres-db.port}
    name = ${postgres-db.database}
    user = ${postgres-db.user}
    password = ${postgres-db.password}
  }
  
  # Flight operations configuration
  flight {
    max-capacity = 300
    default-allocation-timeout = 30s
  }
  
  # Stream configuration
  stream {
    parallelism = 4
    buffer-size = 100
  }
}
